display_information:
  name: TeamLoop
  description: Plan team lunches, potlucks, runs, and fitness sessions directly in Slack.
  background_color: "#5F9F68"
features:
  bot_user:
    display_name: TeamLoop
    always_online: false
  slash_commands:
    - command: /lunch
      description: Plan a team lunch
      usage_hint: ""
      should_escape: false
    - command: /dinner
      description: Plan a team dinner
      usage_hint: ""
      should_escape: false
    - command: /potluck
      description: Plan a team potluck
      usage_hint: ""
      should_escape: false
    - command: /weekendrun
      description: Plan a weekend run
      usage_hint: ""
      should_escape: false
    - command: /marathon
      description: Plan marathon training or a race
      usage_hint: ""
      should_escape: false
    - command: /hyrox
      description: Plan a HYROX session
      usage_hint: ""
      should_escape: false
oauth_config:
  redirect_urls:
    - https://YOUR_DOMAIN/slack/oauth_redirect
  scopes:
    bot:
      - commands
      - chat:write
      - chat:write.public
settings:
  interactivity:
    is_enabled: true
    request_url: https://YOUR_DOMAIN/slack/events
  event_subscriptions:
    request_url: https://YOUR_DOMAIN/slack/events
    bot_events:
      - app_uninstalled
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
